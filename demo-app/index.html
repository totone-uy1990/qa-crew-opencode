<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo App</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; }
    form { display: flex; flex-direction: column; gap: 1rem; max-width: 400px; }
    input, button { padding: 0.5rem; font-size: 1rem; }
    .error { color: red; }
    .success { color: green; }
    .task { display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>Demo App</h1>

  <section id="login-section">
    <h2>Login</h2>
    <form id="login-form">
      <input id="email" type="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Password" required>
      <button type="submit" id="login-btn">Login</button>
    </form>
    <p id="login-message"></p>
  </section>

  <section id="task-section" hidden>
    <h2>Tasks</h2>
    <form id="task-form">
      <input id="task-input" type="text" placeholder="New task" required>
      <button type="submit" id="add-task-btn">Add Task</button>
    </form>
    <div id="task-list"></div>
    <button id="logout-btn">Logout</button>
  </section>

  <script>
    const VALID_EMAIL = "test@example.com";
    const VALID_PASSWORD = "password123";

    document.getElementById("login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const message = document.getElementById("login-message");

      if (email === VALID_EMAIL && password === VALID_PASSWORD) {
        message.className = "success";
        message.textContent = "Login successful!";
        document.getElementById("login-section").hidden = true;
        document.getElementById("task-section").hidden = false;
      } else {
        message.className = "error";
        message.textContent = "Invalid email or password";
      }
    });

    document.getElementById("task-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const input = document.getElementById("task-input");
      const list = document.getElementById("task-list");
      const task = document.createElement("div");
      task.className = "task";
      task.innerHTML = `<span>${input.value}</span><button onclick="this.parentElement.remove()">Delete</button>`;
      list.appendChild(task);
      input.value = "";
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      document.getElementById("task-section").hidden = true;
      document.getElementById("login-section").hidden = false;
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      document.getElementById("login-message").textContent = "";
      document.getElementById("task-list").innerHTML = "";
    });
  </script>
</body>
</html>
